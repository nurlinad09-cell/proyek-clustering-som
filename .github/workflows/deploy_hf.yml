name: Sync to Hugging Face

on:
  push:
    branches: [ main ] # Menjalankan otomatis saat push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # Aktifkan jika ada file dataset berukuran besar

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Ganti USERNAME dengan username HF Anda, dan NAMA_SPACE dengan nama Space Anda
          git remote add hf https://nurlina:$HF_TOKEN@huggingface.co/spaces/nurlina/apiclusteringsom
          
          # Paksa push perubahan dari GitHub ke Hugging Face Space
          git push --force hf main